group 'com.couttsconsulting.flutter_libphonenumber'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '2.2.21'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

// Apply the Kotlin plugin unless AGP >=9 has built-in Kotlin enabled.
// Flutter >=3.44 may set android.builtInKotlin=false during migration,
// in which case we must still apply it ourselves even on AGP >=9.
def agpMajor = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0] as int
def builtInKotlin = project.findProperty('android.builtInKotlin')
if (agpMajor < 9 || builtInKotlin == 'false') {
    apply plugin: 'kotlin-android'
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace("com.couttsconsulting.flutter_libphonenumber")
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    compileSdk = flutter.compileSdkVersion

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
    defaultConfig {
        minSdk = flutter.minSdkVersion
    }
    lint {
        disable.add('InvalidPackage')
    }
}

plugins.withId("org.jetbrains.kotlin.android") {
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
        }
    }
}

dependencies {
    implementation "com.googlecode.libphonenumber:libphonenumber:9.0.20"
}
